{% extends "base.html" %}

{% block title %}Melo Finance - Editar Cliente{% endblock %}

{% block content %}
<div class="flex-1 flex flex-col p-4 md:p-8 max-w-2xl mx-auto w-full">
    <!-- Header Especial con Avatar Simulado -->
    <div class="mb-10 text-center relative">
        <div class="absolute -top-10 left-1/2 -translate-x-1/2 w-48 h-48 bg-emerald-500/5 blur-3xl rounded-full"></div>
        <div class="relative inline-flex mb-4">
            <div class="size-20 bg-emerald-500/10 text-emerald-600 rounded-[2rem] flex items-center justify-center border-4 border-white dark:border-slate-950 shadow-2xl">
                <span class="material-symbols-outlined text-4xl">face</span>
            </div>
            <div class="absolute -bottom-1 -right-1 size-8 bg-primary text-white rounded-full flex items-center justify-center border-4 border-white dark:border-slate-950 shadow-lg">
                <span class="material-symbols-outlined text-xs">edit</span>
            </div>
        </div>
        <h1 class="text-3xl font-black text-slate-900 dark:text-white mb-2 leading-none">{{ client.nombre }}</h1>
        <p class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em]">Expediente melo-{{ client.id }}</p>
    </div>

    <form method="POST" action="/clients/{{ client.id }}/edit" class="space-y-8 animate-in fade-in slide-in-from-bottom-4 duration-700">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        
        <div class="space-y-6">
            <!-- Nombre Completo (Destacado) -->
            <div class="relative group">
                <label class="absolute -top-3 left-6 px-2 bg-white dark:bg-slate-950 text-[10px] font-black text-primary uppercase tracking-widest z-10 transition-all group-focus-within:scale-110">Nombre Completo</label>
                <div class="relative">
                    <span class="absolute left-6 top-1/2 -translate-y-1/2 material-symbols-outlined text-slate-300 group-focus-within:text-primary transition-colors">person</span>
                    <input name="nombre" value="{{ client.nombre }}" required
                        class="block w-full pl-16 pr-6 py-6 bg-slate-50 dark:bg-slate-900/50 border-2 border-transparent focus:border-primary/20 focus:bg-white dark:focus:bg-slate-900 rounded-[2.5rem] text-slate-900 dark:text-white placeholder-slate-300 focus:ring-4 focus:ring-primary/5 transition-all font-black text-xl shadow-sm"
                        placeholder="Ej: Juan Pérez" type="text" />
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- Cédula -->
                <div class="relative group">
                    <label class="absolute -top-3 left-6 px-2 bg-white dark:bg-slate-950 text-[10px] font-black text-slate-400 uppercase tracking-widest z-10">Cédula / ID</label>
                    <div class="relative">
                        <span class="absolute left-6 top-1/2 -translate-y-1/2 material-symbols-outlined text-slate-300 group-focus-within:text-primary transition-colors">badge</span>
                        <input name="cedula" value="{{ client.cedula }}"
                            class="block w-full pl-16 pr-6 py-5 bg-slate-50 dark:bg-slate-900/50 border-2 border-transparent focus:border-primary/20 focus:bg-white dark:focus:bg-slate-900 rounded-2xl text-slate-900 dark:text-white placeholder-slate-300 focus:ring-4 focus:ring-primary/5 transition-all font-bold"
                            placeholder="V-20.123.456" type="text" inputmode="numeric" />
                    </div>
                </div>

                <!-- Teléfono -->
                <div class="relative group">
                    <label class="absolute -top-3 left-6 px-2 bg-white dark:bg-slate-950 text-[10px] font-black text-slate-400 uppercase tracking-widest z-10">Teléfono</label>
                    <div class="relative">
                        <span class="absolute left-6 top-1/2 -translate-y-1/2 material-symbols-outlined text-slate-300 group-focus-within:text-primary transition-colors">call</span>
                        <input name="telefono" value="{{ client.telefono }}"
                            class="block w-full pl-16 pr-6 py-5 bg-slate-50 dark:bg-slate-900/50 border-2 border-transparent focus:border-primary/20 focus:bg-white dark:focus:bg-slate-900 rounded-2xl text-slate-900 dark:text-white placeholder-slate-300 focus:ring-4 focus:ring-primary/5 transition-all font-bold"
                            placeholder="0412-1234567" type="tel" inputmode="tel" />
                    </div>
                </div>
            </div>

            <!-- Dirección -->
            <div class="relative group">
                <label class="absolute -top-3 left-6 px-2 bg-white dark:bg-slate-950 text-[10px] font-black text-slate-400 uppercase tracking-widest z-10">Dirección Residencial</label>
                <div class="relative">
                    <span class="absolute left-6 top-1/2 -translate-y-1/2 material-symbols-outlined text-slate-300 group-focus-within:text-primary transition-colors">location_on</span>
                    <input name="direccion" value="{{ client.direccion }}"
                        class="block w-full pl-16 pr-6 py-5 bg-slate-50 dark:bg-slate-900/50 border-2 border-transparent focus:border-primary/20 focus:bg-white dark:focus:bg-slate-900 rounded-2xl text-slate-900 dark:text-white placeholder-slate-300 focus:ring-4 focus:ring-primary/5 transition-all font-bold"
                        placeholder="Calle, Sector, Ciudad..." type="text" />
                </div>
            </div>
        </div>

        <div class="pt-6">
            <button type="submit"
                class="w-full h-16 bg-slate-900 dark:bg-primary text-white rounded-[2rem] font-black text-lg shadow-2xl shadow-primary/30 hover:scale-[1.02] active:scale-[0.98] transition-all flex items-center justify-center gap-3 uppercase tracking-widest">
                <span>Guardar Cambios</span>
                <span class="material-symbols-outlined">save</span>
            </button>
            <p class="text-center text-[10px] text-slate-400 font-bold uppercase mt-6 tracking-widest">Registrado por Melo Finance</p>
        </div>
    </form>
</div>
{% endblock %}
