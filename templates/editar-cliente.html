<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Melo Finance">
    <meta name="theme-color" content="#043dae">
    <title>Melo Finance - Editar Cliente</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#043dae",
                        "background-light": "#f5f6f8",
                        "background-dark": "#0f1623",
                    },
                    fontFamily: { "display": ["Manrope", "sans-serif"] },
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'Manrope', sans-serif;
            overscroll-behavior-y: contain;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    
        /* Prevención de parpadeo de modo oscuro */
        :root {
            --bg-light: #f5f6f8;
            --bg-dark: #0f1623;
        }
    </style>
    <script src="/static/darkMode.js"></script>
</head>

<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen">
    <div
        class="relative flex min-h-screen w-full flex-col max-w-5xl mx-auto bg-white dark:bg-slate-900 md:shadow-2xl md:border-x border-slate-200 dark:border-slate-800">
        <header
            class="sticky top-0 z-50 flex items-center justify-between p-4 bg-white/90 dark:bg-slate-900/90 backdrop-blur-md border-b border-slate-100 dark:border-slate-800">
            <a href="/clients/{{ client.id }}"
                class="text-slate-900 dark:text-slate-100 flex size-10 shrink-0 items-center justify-center hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full transition-colors">
                <span class="material-symbols-outlined">close</span>
            </a>
            <div class="flex-1 flex flex-col items-center">
                <h2 class="text-primary italic font-black text-xl tracking-tight leading-none pointer-events-none">
                    Melo
                    <span class="text-slate-900 dark:text-white not-italic">Finance</span>
                </h2>
                <p class="text-[10px] text-slate-400 uppercase font-bold tracking-[0.2em] mt-1">Editar Cliente</p>
            </div>
            <div class="flex items-center gap-2">
                <a href="/notifications"
                    class="flex size-10 items-center justify-center rounded-full bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400 hover:text-primary transition-colors relative">
                    <span class="material-symbols-outlined">notifications</span>
                    {% if unread_count > 0 %}
                    <span
                        class="absolute top-2 right-2 w-4 h-4 bg-red-500 rounded-full border border-white dark:border-slate-900 text-[10px] text-white font-bold flex items-center justify-center">{{
                        unread_count }}</span>
                    {% endif %}
                </a>                <button type="button" onclick="toggleDarkMode()"
                    class="flex size-10 items-center justify-center rounded-full bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400 hover:text-primary transition-colors">
                    <span class="material-symbols-outlined dark:hidden">dark_mode</span>
                    <span class="material-symbols-outlined hidden dark:block">light_mode</span>
                </button>

                <a href="/settings/profile"
                    class="flex size-10 items-center justify-center rounded-full bg-primary/10 text-primary hover:bg-primary/20 transition-colors">
                    <span class="material-symbols-outlined">person</span>
                </a>
            </div>
        </header>

        <form method="POST" action="/clients/{{ client.id }}/edit" class="p-8 space-y-6">
            <div class="space-y-4">
                <div class="space-y-2">
                    <label class="text-[10px] uppercase font-bold text-slate-400 ml-2">Nombre Completo</label>
                    <input name="nombre" value="{{ client.nombre }}" required
                        class="w-full h-14 px-6 rounded-2xl bg-slate-50 dark:bg-slate-800 border-none focus:ring-2 focus:ring-primary font-bold text-lg">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-2">
                        <label class="text-[10px] uppercase font-bold text-slate-400 ml-2">Cédula / ID</label>
                        <input name="cedula" value="{{ client.cedula }}"
                            class="w-full h-14 px-6 rounded-2xl bg-slate-50 dark:bg-slate-800 border-none focus:ring-2 focus:ring-primary font-bold"
                            inputmode="numeric">
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] uppercase font-bold text-slate-400 ml-2">Teléfono</label>
                        <input name="telefono" value="{{ client.telefono }}"
                            class="w-full h-14 px-6 rounded-2xl bg-slate-50 dark:bg-slate-800 border-none focus:ring-2 focus:ring-primary font-bold"
                            type="tel" inputmode="tel">
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="text-[10px] uppercase font-bold text-slate-400 ml-2">Dirección</label>
                    <input name="direccion" value="{{ client.direccion }}"
                        class="w-full h-14 px-6 rounded-2xl bg-slate-50 dark:bg-slate-800 border-none focus:ring-2 focus:ring-primary font-bold">
                </div>
            </div>

            <div class="pt-4">
                <button type="submit"
                    class="w-full h-14 bg-primary text-white rounded-2xl font-black text-lg shadow-xl shadow-primary/30 hover:scale-[1.02] active:scale-95 transition-all">
                    Guardar Cambios
                </button>
                <p class="text-center text-[10px] text-slate-400 font-bold uppercase mt-4 tracking-widest">ID de
                    Cliente: melo-{{ client.id }}</p>
            </div>
        </form>
    </div>
    </div>
    <!-- Bottom Navigation Bar -->
    <div
        class="fixed bottom-0 md:bottom-6 left-0 right-0 flex max-w-md md:max-w-3xl lg:max-w-5xl mx-auto gap-2 border-t md:border border-slate-200 dark:border-slate-700 md:rounded-3xl md:shadow-2xl bg-white/90 dark:bg-slate-900/90 backdrop-blur-md px-4 pb-6 pt-2 md:py-2 z-50 transition-all">
        <a class="flex flex-1 md:flex-row flex-col items-center justify-center gap-2 md:gap-3 text-slate-400 dark:text-slate-500 hover:text-primary transition-colors md:hover:bg-primary/5 md:py-3 md:rounded-xl"
            href="/dashboard">
            <span class="material-symbols-outlined">dashboard</span>
            <p class="text-[10px] md:text-sm font-medium leading-normal tracking-tight">Dashboard</p>
        </a>
        <a class="flex flex-1 md:flex-row flex-col items-center justify-center gap-2 md:gap-3 text-primary md:hover:bg-primary/5 md:py-3 md:rounded-xl transition-colors"
            href="/clients">
            <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">group</span>
            <p class="text-[10px] md:text-sm font-bold leading-normal tracking-tight">Clientes</p>
        </a>
        <a class="flex flex-1 md:flex-row flex-col items-center justify-center gap-2 md:gap-3 text-slate-400 dark:text-slate-500 hover:text-primary transition-colors md:hover:bg-primary/5 md:py-3 md:rounded-xl"
            href="/loans">
            <span class="material-symbols-outlined">account_balance_wallet</span>
            <p class="text-[10px] md:text-sm font-medium leading-normal tracking-tight">Préstamos</p>
        </a>
        <a class="flex flex-1 md:flex-row flex-col items-center justify-center gap-2 md:gap-3 text-slate-400 dark:text-slate-500 hover:text-primary transition-colors md:hover:bg-primary/5 md:py-3 md:rounded-xl"
            href="/settings/profile">
            <span class="material-symbols-outlined">settings</span>
            <p class="text-[10px] md:text-sm font-medium leading-normal tracking-tight">Ajustes</p>
        </a>
    </div>
    </div>
</body>

</html>
