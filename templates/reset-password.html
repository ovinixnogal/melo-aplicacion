<!DOCTYPE html>
<html class="light" lang="es">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Melo Finance">
    <meta name="theme-color" content="#043dae">
    <title>Melo Finance · Cambiar Clave</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=block"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0,1&display=block"
        rel="stylesheet" />
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "melo": {
                            DEFAULT: "#043dae",
                            dark: "#032b7c",
                            light: "#2563eb",
                            accent: "#3b82f6"
                        },
                    },
                    fontFamily: {
                        sans: ["Outfit", "system-ui", "sans-serif"],
                    },
                    animation: {
                        'blob': 'blob 10s infinite',
                        'fade-in': 'fadeIn 0.5s ease-out forwards',
                        'slide-up': 'slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                    },
                    keyframes: {
                        blob: {
                            '0%': { transform: 'translate(0px, 0px) scale(1)' },
                            '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
                            '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
                            '100%': { transform: 'translate(0px, 0px) scale(1)' },
                        },
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },
                        },
                        slideUp: {
                            '0%': { transform: 'translateY(20px)', opacity: '0' },
                            '100%': { transform: 'translateY(0)', opacity: '1' },
                        }
                    }
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            -webkit-font-smoothing: antialiased;
            overflow: hidden;
            height: 100dvh;
            width: 100vw;
            position: fixed;
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        .dark .glass-panel {
            background: rgba(15, 22, 35, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .mesh-gradient {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: -1;
            background-color: #f8fafc;
            background-image: 
                radial-gradient(at 0% 0%, rgba(4, 61, 174, 0.1) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(59, 130, 246, 0.1) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(4, 61, 174, 0.05) 0px, transparent 50%),
                radial-gradient(at 0% 100%, rgba(59, 130, 246, 0.05) 0px, transparent 50%);
        }

        .dark .mesh-gradient {
            background-color: #020617;
            background-image: 
                radial-gradient(at 0% 0%, rgba(4, 61, 174, 0.2) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(30, 58, 138, 0.2) 0px, transparent 50%);
        }

        .blob {
            position: absolute;
            width: 50vw;
            height: 50vw;
            background: rgba(4, 61, 174, 0.12);
            filter: blur(80px);
            border-radius: 50%;
            z-index: -1;
        }

        input:focus + span.material-symbols-outlined { color: #043dae; }

        input::-ms-reveal,
        input::-ms-clear {
            display: none;
        }

        input::-webkit-contacts-auto-fill-button, 
        input::-webkit-credentials-auto-fill-button {
            visibility: hidden;
            display: none !important;
            pointer-events: none;
            position: absolute;
            right: 0;
        }

    </style>
    <script src="/static/darkMode.js"></script>
</head>

<body class="flex flex-col relative text-slate-900 dark:text-slate-100">
    <div class="mesh-gradient"></div>
    <div class="absolute inset-0 overflow-hidden pointer-events-none">
        <div class="blob left-[-10%] top-[-10%] animate-blob"></div>
        <div class="blob right-[-5%] bottom-[-5%] animate-blob" style="animation-delay: 2s;"></div>
    </div>

    <div class="absolute top-4 right-4 md:top-8 md:right-8 z-50">
        <button type="button" onclick="toggleDarkMode()"
            class="flex h-12 w-12 items-center justify-center rounded-2xl glass-panel text-slate-600 dark:text-slate-400 hover:text-melo dark:hover:text-melo transition-all hover:scale-110 active:scale-95 shadow-lg">
            <span class="material-symbols-outlined dark:hidden">dark_mode</span>
            <span class="material-symbols-outlined hidden dark:block">light_mode</span>
        </button>
    </div>

    <main class="flex-1 flex items-center justify-center p-6 md:p-12 max-w-7xl mx-auto w-full h-full relative z-10">
        <div class="w-full max-w-[440px] animate-slide-up flex flex-col justify-center h-full">
            <div class="text-center mb-6">
                <h1 class="text-4xl font-black tracking-tight">
                    <span class="text-melo dark:text-melo-accent">Nueva</span>
                    <span class="text-slate-800 dark:text-white">Contraseña</span>
                </h1>
            </div>

            <div class="glass-panel p-8 md:p-10 rounded-[2.5rem] shadow-2xl relative overflow-hidden group">
                <div class="absolute -top-12 -right-12 w-32 h-32 bg-melo/5 rounded-full group-hover:bg-melo/10 transition-all duration-700"></div>
                
                <div class="relative z-10">
                    <div class="mb-8">
                        <h2 class="text-2xl font-extrabold text-slate-900 dark:text-white mb-2">Restablecer Clave</h2>
                        <p class="text-sm text-slate-500 dark:text-slate-400 font-medium">Crea una contraseña segura para tu cuenta.</p>
                    </div>

                    <form id="resetForm" action="/reset-password/{{ token }}" method="POST" class="space-y-6">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                        
                        {% if error %}
                        <div class="flex items-center gap-3 p-4 rounded-2xl bg-red-50 dark:bg-red-500/10 border border-red-100 dark:border-red-500/20 text-red-600 dark:text-red-400 animate-fade-in">
                            <span class="material-symbols-outlined">error</span>
                            <span class="text-sm font-bold">{{ error }}</span>
                        </div>
                        {% endif %}

                        <div class="space-y-4">
                            <div class="space-y-1.5">
                                <label class="text-[11px] font-bold text-slate-400 uppercase tracking-widest ml-1">Nueva Clave</label>
                                <div class="relative">
                                    <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-300 text-xl">lock</span>
                                    <input id="passwordInput" name="password" type="password" required
                                        class="w-full pl-12 pr-12 py-4 bg-white/50 dark:bg-slate-950/50 border border-slate-200 dark:border-slate-800 rounded-2xl focus:border-melo focus:ring-4 focus:ring-melo/10 transition-all outline-none font-medium dark:white text-sm"
                                        placeholder="••••••••">
                                    <button type="button" onclick="togglePassword(this, 'passwordInput')" 
                                        class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-melo">
                                        <span class="material-symbols-outlined text-xl">visibility</span>
                                    </button>
                                </div>
                            </div>

                            <div class="space-y-1.5">
                                <label class="text-[11px] font-bold text-slate-400 uppercase tracking-widest ml-1">Confirmar Clave</label>
                                <div class="relative">
                                    <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-300 text-xl">lock_reset</span>
                                    <input id="confirmPasswordInput" name="confirm_password" type="password" required
                                        class="w-full pl-12 pr-12 py-4 bg-white/50 dark:bg-slate-950/50 border border-slate-200 dark:border-slate-800 rounded-2xl focus:border-melo focus:ring-4 focus:ring-melo/10 transition-all outline-none font-medium dark:white text-sm"
                                        placeholder="••••••••">
                                </div>
                            </div>
                        </div>

                        <button type="submit"
                            class="w-full bg-melo hover:bg-melo-dark text-white rounded-2xl py-4 font-bold text-lg shadow-xl shadow-melo/20 active:scale-[0.98] transition-all flex items-center justify-center gap-3 group">
                            Actualizar Clave
                            <span class="material-symbols-outlined group-hover:translate-x-1 transition-transform">update</span>
                        </button>
                    </form>
                </div>
            </div>
            
            <footer class="mt-8 text-center text-[10px] text-slate-400 dark:text-slate-600 font-bold uppercase tracking-widest">
                © 2026 Melo Finance · Seguridad Extrema
            </footer>
        </div>
    </main>

    <script>
        function togglePassword(btn, inputId) {
            const input = document.getElementById(inputId);
            const icon = btn.querySelector('.material-symbols-outlined');
            input.type = input.type === 'password' ? 'text' : 'password';
            icon.textContent = input.type === 'password' ? 'visibility' : 'visibility_off';
        }

        const form = document.getElementById('resetForm');
        const password = document.getElementById('passwordInput');
        const confirmPassword = document.getElementById('confirmPasswordInput');

        form.addEventListener('submit', function (e) {
            if (password.value !== confirmPassword.value) {
                e.preventDefault();
                alert('Las contraseñas no coinciden.');
            }
        });

    </script>
</body>

</html>
