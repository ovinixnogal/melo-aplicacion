<!DOCTYPE html>
<html class="light" lang="es">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Melo Finance">
    <meta name="theme-color" content="#043dae">
    <title>Melo Finance · Cambiar contraseña</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=block"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0,1&display=block"
        rel="stylesheet" />
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "melo": "#043dae",
                        "melo-dark": "#032b7c",
                    },
                    fontFamily: {
                        sans: ["Outfit", "system-ui", "sans-serif"],
                    },
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .logo-text {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            line-height: 1;
        }

        .logo-melo {
            color: #043dae;
        }

        .logo-finance {
            color: #1e293b;
        }

        .dark .logo-finance {
            color: #e2e8f0;
        }

        /* Ola decorativa en la parte inferior */
        .wave-bg {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 200px;
            background: linear-gradient(180deg, transparent 0%, rgba(4, 61, 174, 0.03) 100%);
            border-radius: 50% 50% 0 0;
            pointer-events: none;
        }

        .dark .wave-bg {
            background: linear-gradient(180deg, transparent 0%, rgba(4, 61, 174, 0.08) 100%);
        }

        /* Preloader Premium */
        #preloader {
            position: fixed;
            inset: 0;
            z-index: 99999;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease-in-out, visibility 0.5s;
        }

        .dark #preloader {
            background: #0f1623;
        }

        #preloader.loaded {
            opacity: 0;
            visibility: hidden;
        }

        .loader-logo {
            font-size: 2.5rem;
            font-weight: 900;
            letter-spacing: -0.02em;
            animation: loader-pulse 2s infinite ease-in-out;
        }

        @keyframes loader-pulse {
            0%, 100% { transform: scale(1); opacity: 1; filter: blur(0px); }
            50% { transform: scale(1.05); opacity: 0.7; filter: blur(1px); }
        }
    </style>
    <script src="/static/darkMode.js"></script>
</head>

<body class="min-h-screen flex flex-col bg-white dark:bg-black relative overflow-x-hidden">
    <!-- Preloader -->
    <div id="preloader">
        <div class="loader-logo logo-text">
            <span class="logo-melo">Melo</span>
            <span class="logo-finance">Finance</span>
        </div>
    </div>

    <div class="absolute top-4 right-4 z-50"> <button type="button" onclick="toggleDarkMode()"
            class="flex size-10 items-center justify-center rounded-full bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400 hover:text-primary transition-colors">
            <span class="material-symbols-outlined dark:hidden">dark_mode</span>
            <span class="material-symbols-outlined hidden dark:block">light_mode</span>
        </button>
    </div>
    
    <!-- Fondo con gradiente dinámico -->
    <div
        class="fixed inset-0 bg-gradient-to-br from-melo/10 via-transparent to-transparent dark:from-melo/5 pointer-events-none">
    </div>
    <div class="wave-bg"></div>

    <!-- Contenido principal -->
    <div
        class="relative flex-1 flex flex-col items-center justify-center max-w-7xl mx-auto w-full px-6 py-8 min-h-screen">

        <div class="w-full max-w-md mx-auto">
            <div class="text-center mb-10">
                <div class="logo-text text-4xl mb-4">
                    <span class="logo-melo">Melo</span>
                    <span class="logo-finance">Finance</span>
                </div>
                <h1 class="text-2xl font-black text-gray-800 dark:text-white">Cambiar contraseña</h1>
                <p class="text-gray-500 dark:text-gray-400 mt-2 font-medium">Ingresa tu nueva contraseña para continuar</p>
            </div>

            <form id="resetForm" action="/reset-password/{{ token }}" method="POST" class="space-y-6 w-full">
                <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                
                {% if error %}
                <div class="flex items-center gap-3 text-base text-red-600 dark:text-red-400 bg-red-50 dark:bg-red-500/10 p-5 rounded-3xl border border-red-100 dark:border-red-500/20">
                    <span class="material-symbols-outlined text-[24px]">error</span>
                    <span class="font-bold">{{ error }}</span>
                </div>
                {% endif %}

                <!-- Nueva contraseña -->
                <div class="space-y-3">
                    <label class="text-base font-bold text-gray-700 dark:text-gray-300 ml-1 uppercase tracking-wider">Nueva Contraseña</label>
                    <div class="relative">
                        <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-2xl">lock</span>
                        <input id="passwordInput" name="password" type="password" required
                            class="w-full pl-14 pr-12 py-6 bg-gray-50 dark:bg-gray-900 border border-gray-200 dark:border-gray-800 rounded-[2rem] focus:border-melo focus:ring-2 focus:ring-melo/20 transition-all text-lg placeholder:text-gray-400 font-medium dark:text-white"
                            placeholder="••••••••">
                        <button type="button" onclick="togglePassword(this, 'passwordInput')"
                            class="absolute right-6 top-1/2 -translate-y-1/2 text-gray-400 hover:text-melo transition-colors">
                            <span class="material-symbols-outlined text-2xl">visibility</span>
                        </button>
                    </div>
                </div>

                <!-- Confirmar contraseña -->
                <div class="space-y-3">
                    <label class="text-base font-bold text-gray-700 dark:text-gray-300 ml-1 uppercase tracking-wider">Confirmar Contraseña</label>
                    <div class="relative">
                        <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-2xl">lock</span>
                        <input id="confirmPasswordInput" name="confirm_password" type="password" required
                            class="w-full pl-14 pr-4 py-6 bg-gray-50 dark:bg-gray-900 border border-gray-200 dark:border-gray-800 rounded-[2rem] focus:border-melo focus:ring-2 focus:ring-melo/20 transition-all text-lg placeholder:text-gray-400 font-medium dark:text-white"
                            placeholder="••••••••">
                    </div>
                </div>

                <!-- Botón principal -->
                <button type="submit"
                    class="w-full bg-melo text-white rounded-[2rem] py-6 font-black text-xl hover:bg-melo-dark active:scale-[0.98] transition-all mt-4 shadow-2xl shadow-melo/30 flex items-center justify-center gap-3">
                    Actualizar contraseña
                    <span class="material-symbols-outlined">update</span>
                </button>
            </form>
        </div>
    </div>

    <script>
        function togglePassword(btn, id) {
            const input = document.getElementById(id);
            const icon = btn.querySelector('.material-symbols-outlined');
            const type = input.type === 'password' ? 'text' : 'password';
            input.type = type;
            icon.textContent = type === 'password' ? 'visibility' : 'visibility_off';
        }

        const form = document.getElementById('resetForm');
        const password = document.getElementById('passwordInput');
        const confirmPassword = document.getElementById('confirmPasswordInput');

        form.addEventListener('submit', function (e) {
            if (password.value !== confirmPassword.value) {
                e.preventDefault();
                alert('Las contraseñas no coinciden.');
            }
        });

        // Hide Preloader
        window.addEventListener('load', function() {
            const preloader = document.getElementById('preloader');
            if (preloader) {
                setTimeout(() => {
                    preloader.classList.add('loaded');
                }, 800);
            }
        });
    </script>
</body>

</html>
