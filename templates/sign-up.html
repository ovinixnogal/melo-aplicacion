<!DOCTYPE html>
<html class="light" lang="es">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Melo Finance">
    <meta name="theme-color" content="#043dae">
    <title>Melo Finance - Crear Cuenta</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0,1"
        rel="stylesheet" />
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "melo": "#043dae",
                        "melo-dark": "#032b7c",
                    },
                    fontFamily: {
                        sans: ["Outfit", "system-ui", "sans-serif"],
                    },
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .logo-text {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            line-height: 1;
        }

        .logo-melo {
            color: #043dae;
        }

        .logo-finance {
            color: #1e293b;
        }

        .dark .logo-finance {
            color: #e2e8f0;
        }

        .wave-bg {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 200px;
            background: linear-gradient(180deg, transparent 0%, rgba(4, 61, 174, 0.03) 100%);
            border-radius: 50% 50% 0 0;
            pointer-events: none;
        }

        /* Prevención de parpadeo de modo oscuro */
        :root {
            --bg-light: #f5f6f8;
            --bg-dark: #0f1623;
        }
    </style>
    <script src="/static/darkMode.js"></script>
</head>

<body class="bg-white dark:bg-black min-h-screen flex flex-col relative overflow-x-hidden antialiased">
    <div class="absolute top-4 right-4 z-50"> <button type="button" onclick="toggleDarkMode()"
            class="flex size-10 items-center justify-center rounded-full bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400 hover:text-primary transition-colors">
            <span class="material-symbols-outlined dark:hidden">dark_mode</span>
            <span class="material-symbols-outlined hidden dark:block">light_mode</span>
        </button>
    </div>
    <!-- Background patterns -->
    <div class="fixed inset-0 bg-gradient-to-br from-melo/5 via-transparent to-transparent pointer-events-none"></div>
    <div class="wave-bg"></div>

    <div class="relative flex-1 flex flex-col items-center justify-center p-6 py-12">
        <div class="w-full max-w-md space-y-8">
            <!-- Header Section -->
            <div class="text-center space-y-4">
                <div class="logo-text inline-block">
                    <span class="logo-melo">Melo</span>
                    <span class="logo-finance font-extrabold not-italic">Finance</span>
                </div>
                <div>
                    <h1 class="text-3xl font-black text-slate-900 dark:text-white tracking-tight">Crea tu cuenta</h1>
                    <p class="text-slate-500 dark:text-slate-400 font-medium mt-1">Empieza a gestionar tus préstamos hoy
                    </p>
                </div>
            </div>

            <!-- Registration Form -->
            <form action="/signup" method="POST" class="space-y-4">
                <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                <div class="grid grid-cols-2 gap-4">
                    <!-- Name Field -->
                    <div class="space-y-2">
                        <label
                            class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] ml-1">Nombre</label>
                        <input name="nombre" required type="text"
                            class="w-full px-5 py-4 bg-slate-50 dark:bg-slate-900 border border-slate-100 dark:border-slate-800 rounded-3xl focus:border-melo focus:ring-4 focus:ring-melo/10 transition-all font-bold text-slate-900 dark:text-white placeholder:text-slate-300"
                            placeholder="Ej. Juan" />
                    </div>
                    <!-- Surname Field -->
                    <div class="space-y-2">
                        <label
                            class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] ml-1">Apellido</label>
                        <input name="apellido" required type="text"
                            class="w-full px-5 py-4 bg-slate-50 dark:bg-slate-900 border border-slate-100 dark:border-slate-800 rounded-3xl focus:border-melo focus:ring-4 focus:ring-melo/10 transition-all font-bold text-slate-900 dark:text-white placeholder:text-slate-300"
                            placeholder="Pérez" />
                    </div>
                </div>

                <!-- Email Field -->
                <div class="space-y-2">
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] ml-1">Correo
                        Electrónico</label>
                    <div class="relative">
                        <span
                            class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-300">mail</span>
                        <input name="email" required type="email"
                            class="w-full pl-12 pr-5 py-4 bg-slate-50 dark:bg-slate-900 border border-slate-100 dark:border-slate-800 rounded-3xl focus:border-melo focus:ring-4 focus:ring-melo/10 transition-all font-bold text-slate-900 dark:text-white placeholder:text-slate-300"
                            placeholder="tu@email.com" />
                    </div>
                </div>

                <!-- Password Field -->
                <div class="space-y-2">
                    <label
                        class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] ml-1">Contraseña</label>
                    <div class="relative group">
                        <span
                            class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-300">lock</span>
                        <input name="password" required type="password" id="passwordInput"
                            pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}"
                            title="Debe contener al menos un número, una letra mayúscula, una minúscula y mínimo 8 caracteres"
                            class="w-full pl-12 pr-12 py-4 bg-slate-50 dark:bg-slate-900 border border-slate-100 dark:border-slate-800 rounded-3xl focus:border-melo focus:ring-4 focus:ring-melo/10 transition-all font-bold text-slate-900 dark:text-white placeholder:text-slate-300"
                            placeholder="••••••••" />
                        <button type="button" onclick="togglePassword('passwordInput', 'eyeIcon')"
                            class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-melo transition-colors">
                            <span class="material-symbols-outlined" id="eyeIcon">visibility</span>
                        </button>
                    </div>
                    <p class="text-[10px] text-slate-400 ml-2 mt-1 font-medium">Mín. 8 caracteres, 1 mayúscula, 1
                        minúscula y 1 número.</p>
                </div>

                <!-- Confirm Password Field -->
                <div class="space-y-2">
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] ml-1">Confirmar
                        Contraseña</label>
                    <div class="relative group">
                        <span
                            class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-300">lock_reset</span>
                        <input name="confirm_password" required type="password" id="confirmPasswordInput"
                            class="w-full pl-12 pr-12 py-4 bg-slate-50 dark:bg-slate-900 border border-slate-100 dark:border-slate-800 rounded-3xl focus:border-melo focus:ring-4 focus:ring-melo/10 transition-all font-bold text-slate-900 dark:text-white placeholder:text-slate-300"
                            placeholder="••••••••" />
                        <button type="button" onclick="togglePassword('confirmPasswordInput', 'confirmEyeIcon')"
                            class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-melo transition-colors">
                            <span class="material-symbols-outlined" id="confirmEyeIcon">visibility</span>
                        </button>
                    </div>
                </div>

                <!-- Terms checkbox -->
                <label class="flex items-center gap-3 px-1 py-2 cursor-pointer group">
                    <input type="checkbox" required
                        class="w-5 h-5 rounded-lg border-slate-200 text-melo focus:ring-melo/20 transition-all cursor-pointer" />
                    <span class="text-xs text-slate-500 font-medium group-hover:text-slate-700 transition-colors">
                        Acepto los <span class="text-melo font-black">términos y condiciones</span>
                    </span>
                </label>

                <!-- Action Button -->
                <button type="submit" id="submitBtn"
                    class="w-full py-5 bg-melo text-white rounded-3xl font-black text-lg shadow-2xl shadow-melo/20 hover:bg-melo-dark active:scale-[0.98] transition-all flex items-center justify-center gap-3 uppercase tracking-widest">
                    Crear mi cuenta
                    <span class="material-symbols-outlined">rocket_launch</span>
                </button>
            </form>

            <!-- Error message container -->
            <div id="passwordError" class="hidden align-center justify-center mt-2">
                <p class="text-xs text-red-500 font-bold text-center">Las contraseñas no coinciden.</p>
            </div>

            <!-- Footer -->
            <div class="text-center pt-8">
                <p class="text-slate-500 font-medium">
                    ¿Ya tienes una cuenta?
                    <a href="/login" class="text-melo font-black ml-1 hover:underline">Inicia Sesión</a>
                </p>
                <div class="mt-12 flex items-center gap-4 opacity-50">
                    <div class="flex-1 h-px bg-slate-200"></div>
                    <span class="text-[8px] font-black uppercase tracking-[0.3em] text-slate-400">Protección Melo
                        Finance</span>
                    <div class="flex-1 h-px bg-slate-200"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function togglePassword(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            const type = input.type === 'password' ? 'text' : 'password';
            input.type = type;
            icon.textContent = type === 'password' ? 'visibility' : 'visibility_off';
        }

        const form = document.querySelector('form');
        const password = document.getElementById('passwordInput');
        const confirmPassword = document.getElementById('confirmPasswordInput');
        const errorMsg = document.getElementById('passwordError');

        form.addEventListener('submit', function (e) {
            if (password.value !== confirmPassword.value) {
                e.preventDefault();
                errorMsg.classList.remove('hidden');
                confirmPassword.classList.add('border-red-500', 'ring-red-500/20');
            } else {
                errorMsg.classList.add('hidden');
                confirmPassword.classList.remove('border-red-500', 'ring-red-500/20');
            }
        });
    </script>
</body>

</html>
