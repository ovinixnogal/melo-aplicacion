<!DOCTYPE html>
<html class="light" lang="es">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Melo Finance">
    <meta name="theme-color" content="#043dae">
    <title>Melo Finance · Crear Cuenta</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=block"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0,1&display=block"
        rel="stylesheet" />
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "melo": {
                            DEFAULT: "#043dae",
                            dark: "#032b7c",
                            light: "#2563eb",
                            accent: "#3b82f6"
                        },
                    },
                    fontFamily: {
                        sans: ["Outfit", "system-ui", "sans-serif"],
                    },
                    animation: {
                        'blob': 'blob 10s infinite',
                        'fade-in': 'fadeIn 0.5s ease-out forwards',
                        'slide-up': 'slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                    },
                    keyframes: {
                        blob: {
                            '0%': { transform: 'translate(0px, 0px) scale(1)' },
                            '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
                            '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
                            '100%': { transform: 'translate(0px, 0px) scale(1)' },
                        },
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },
                        },
                        slideUp: {
                            '0%': { transform: 'translateY(20px)', opacity: '0' },
                            '100%': { transform: 'translateY(0)', opacity: '1' },
                        }
                    }
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            -webkit-font-smoothing: antialiased;
            overflow: hidden;
            height: 100dvh;
            width: 100vw;
            position: fixed;
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        .dark .glass-panel {
            background: rgba(15, 22, 35, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .mesh-gradient {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: -1;
            background-color: #f8fafc;
            background-image: 
                radial-gradient(at 0% 0%, rgba(4, 61, 174, 0.1) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(59, 130, 246, 0.1) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(4, 61, 174, 0.05) 0px, transparent 50%),
                radial-gradient(at 0% 100%, rgba(59, 130, 246, 0.05) 0px, transparent 50%);
        }

        .dark .mesh-gradient {
            background-color: #020617;
            background-image: 
                radial-gradient(at 0% 0%, rgba(4, 61, 174, 0.2) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(30, 58, 138, 0.2) 0px, transparent 50%);
        }

        .blob {
            position: absolute;
            width: 50vw;
            height: 50vw;
            background: rgba(4, 61, 174, 0.12);
            filter: blur(80px);
            border-radius: 50%;
            z-index: -1;
        }

        input:focus + span.material-symbols-outlined { color: #043dae; }

        input::-ms-reveal,
        input::-ms-clear {
            display: none;
        }

        input::-webkit-contacts-auto-fill-button, 
        input::-webkit-credentials-auto-fill-button {
            visibility: hidden;
            display: none !important;
            pointer-events: none;
            position: absolute;
            right: 0;
        }

    </style>
    <script src="/static/darkMode.js"></script>
</head>

<body class="flex flex-col relative text-slate-900 dark:text-slate-100">
    <div class="mesh-gradient"></div>
    <div class="absolute inset-0 overflow-hidden pointer-events-none">
        <div class="blob left-[-10%] top-[-10%] animate-blob"></div>
        <div class="blob right-[-5%] bottom-[-5%] animate-blob" style="animation-delay: 2s;"></div>
    </div>

    <div class="absolute top-4 right-4 md:top-8 md:right-8 z-50">
        <button type="button" onclick="toggleDarkMode()"
            class="flex h-12 w-12 items-center justify-center rounded-2xl glass-panel text-slate-600 dark:text-slate-400 hover:text-melo dark:hover:text-melo transition-all hover:scale-110 active:scale-95 shadow-lg">
            <span class="material-symbols-outlined dark:hidden">dark_mode</span>
            <span class="material-symbols-outlined hidden dark:block">light_mode</span>
        </button>
    </div>

    <main class="flex-1 flex items-center justify-center px-4 py-6 md:p-12 max-w-7xl mx-auto w-full h-full relative z-10">
        <div class="w-full max-w-[440px] animate-slide-up flex flex-col justify-center h-full">
            <div class="text-center mb-4 md:mb-6">
                <h1 class="text-3xl md:text-4xl font-black tracking-tight">
                    <span class="text-melo dark:text-melo-accent">Crear</span>
                    <span class="text-slate-800 dark:text-white">Cuenta</span>
                </h1>
            </div>

            <div class="glass-panel p-5 md:p-8 rounded-[2rem] md:rounded-[2.5rem] shadow-2xl relative overflow-hidden group">
                <div class="absolute -top-12 -left-12 w-32 h-32 bg-melo/5 rounded-full group-hover:bg-melo/10 transition-all duration-700"></div>
                
                <div class="relative z-10">
                    <form action="/signup" method="POST" class="space-y-3 md:space-y-4">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                        
                        <div id="emailError" class="hidden items-center gap-2 p-2.5 rounded-xl bg-red-50 dark:bg-red-500/10 border border-red-100 dark:border-red-500/20 text-red-600 dark:text-red-400 animate-fade-in text-xs font-bold">
                            <span class="material-symbols-outlined text-base">error</span>
                            El email ya está registrado
                        </div>

                        <div id="passwordError" class="hidden items-center gap-2 p-2.5 rounded-xl bg-red-50 dark:bg-red-500/10 border border-red-100 dark:border-red-500/20 text-red-600 dark:text-red-400 animate-fade-in text-xs font-bold">
                            <span class="material-symbols-outlined text-base">error</span>
                            Las claves no coinciden
                        </div>

                        <div class="grid grid-cols-2 gap-3">
                            <div class="space-y-1">
                                <label class="text-[9px] md:text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">Nombre</label>
                                <div class="relative">
                                    <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-300 text-base">person</span>
                                    <input name="nombre" type="text" required
                                        class="w-full pl-9 pr-3 py-2.5 bg-white/50 dark:bg-slate-950/50 border border-slate-200 dark:border-slate-800 rounded-xl focus:border-melo focus:ring-4 focus:ring-melo/10 transition-all outline-none font-medium dark:white text-xs"
                                        placeholder="Nombre">
                                </div>
                            </div>
                            <div class="space-y-1">
                                <label class="text-[9px] md:text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">Apellido</label>
                                <div class="relative">
                                    <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-300 text-base">person</span>
                                    <input name="apellido" type="text" required
                                        class="w-full pl-9 pr-3 py-2.5 bg-white/50 dark:bg-slate-950/50 border border-slate-200 dark:border-slate-800 rounded-xl focus:border-melo focus:ring-4 focus:ring-melo/10 transition-all outline-none font-medium dark:white text-xs"
                                        placeholder="Apellido">
                                </div>
                            </div>
                        </div>

                        <div class="space-y-1">
                            <label class="text-[9px] md:text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">Email</label>
                            <div class="relative">
                                <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-300 text-base">mail</span>
                                <input name="email" type="email" required
                                    class="w-full pl-9 pr-3 py-2.5 bg-white/50 dark:bg-slate-950/50 border border-slate-200 dark:border-slate-800 rounded-xl focus:border-melo focus:ring-4 focus:ring-melo/10 transition-all outline-none font-medium dark:white text-xs"
                                    placeholder="usuario@melo.com">
                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-3">
                            <div class="space-y-1">
                                <label class="text-[9px] md:text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">Clave</label>
                                <div class="relative">
                                    <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-300 text-base">lock</span>
                                    <input name="password" id="passwordInput" type="password" required
                                        pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}"
                                        class="w-full pl-9 pr-3 py-2.5 bg-white/50 dark:bg-slate-950/50 border border-slate-200 dark:border-slate-800 rounded-xl focus:border-melo focus:ring-4 focus:ring-melo/10 transition-all outline-none font-medium dark:white text-xs"
                                        placeholder="••••••••">
                                </div>
                            </div>
                            <div class="space-y-1">
                                <label class="text-[9px] md:text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">Confirmar</label>
                                <div class="relative">
                                    <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-300 text-base">lock_reset</span>
                                    <input name="confirm_password" id="confirmPasswordInput" type="password" required
                                        class="w-full pl-9 pr-3 py-2.5 bg-white/50 dark:bg-slate-950/50 border border-slate-200 dark:border-slate-800 rounded-xl focus:border-melo focus:ring-4 focus:ring-melo/10 transition-all outline-none font-medium dark:white text-xs"
                                        placeholder="••••••••">
                                </div>
                            </div>
                        </div>

                        <label class="flex items-center gap-2 px-1 cursor-pointer group">
                            <input type="checkbox" required class="w-3.5 h-3.5 rounded border-slate-200 text-melo focus:ring-melo/10">
                            <span class="text-[10px] text-slate-500 dark:text-slate-400 font-medium group-hover:text-melo transition-colors">
                                Acepto los <a href="#" class="font-bold underline">términos y condiciones</a>
                            </span>
                        </label>

                        <button type="submit"
                            class="w-full bg-melo hover:bg-melo-dark text-white rounded-xl py-3 font-bold text-sm shadow-lg shadow-melo/20 active:scale-[0.98] transition-all flex items-center justify-center gap-2 group">
                            Registrarme
                            <span class="material-symbols-outlined text-base group-hover:translate-x-1 transition-transform">rocket_launch</span>
                        </button>
                    </form>

                    <div class="mt-4 md:mt-6 text-center border-t border-slate-100 dark:border-slate-800 pt-3 md:pt-4">
                        <p class="text-xs md:text-sm text-slate-500 dark:text-slate-400">
                            ¿Ya tienes cuenta? 
                            <a href="/login" class="text-melo dark:text-melo-accent font-bold hover:underline">Inicia sesión</a>
                        </p>
                    </div>
                </div>
            </div>
            
            <footer class="mt-4 text-center text-[9px] text-slate-400 dark:text-slate-600 font-bold uppercase tracking-widest">
                © 2026 Melo Finance
            </footer>
        </div>
    </main>

    <script>
        const form = document.querySelector('form');
        const password = document.getElementById('passwordInput');
        const confirmPassword = document.getElementById('confirmPasswordInput');
        
        form.addEventListener('submit', function (e) {
            if (password.value !== confirmPassword.value) {
                e.preventDefault();
                const err = document.getElementById('passwordError');
                err.classList.remove('hidden');
                err.classList.add('flex');
                confirmPassword.focus();
            } else {
                const err = document.getElementById('passwordError');
                err.classList.add('hidden');
                err.classList.remove('flex');
            }
        });

        window.addEventListener('load', function() {
            if (new URLSearchParams(window.location.search).get('error') === 'exists') {
                const err = document.getElementById('emailError');
                err.classList.remove('hidden');
                err.classList.add('flex');
            }
        });
    </script>
</body>

</html>
