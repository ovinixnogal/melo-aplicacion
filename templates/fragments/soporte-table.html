<!-- Fragmento de tabla de soporte para HTMX -->
<table class="w-full text-left">
    <thead>
        <tr class="bg-slate-50 dark:bg-slate-950 text-slate-500 text-[10px] font-black uppercase tracking-widest">
            <th class="px-8 py-4">Correo</th>
            <th class="px-8 py-4">Fecha</th>
            <th class="px-8 py-4">Token Link</th>
            <th class="px-8 py-4 text-right">Acción</th>
        </tr>
    </thead>
    <tbody class="divide-y divide-slate-100 dark:divide-slate-800">
        {% for r in requests %}
        <tr>
            <td class="px-8 py-6 font-bold">{{ r.email }}</td>
            <td class="px-8 py-6 text-sm text-slate-500">{{ r.fecha.strftime('%d/%m/%Y') }}</td>
            <td class="px-8 py-6">
                <div class="flex items-center gap-2">
                    <input type="text" readonly value="{{ request.base_url }}reset-password/{{ r.token }}" 
                           id="token-{{ r.id }}" class="text-xs bg-slate-50 dark:bg-slate-950 border-none rounded-lg w-full">
                    <button onclick="copyToken('token-{{ r.id }}')" class="p-2 bg-melo text-white rounded-lg hover:bg-melo-dark">
                        <span class="material-symbols-outlined text-sm">content_copy</span>
                    </button>
                </div>
            </td>
            <td class="px-8 py-6 text-right">
                {% if not r.atendida %}
                <form hx-post="/admin/soporte/atender/{{ r.id }}" hx-target="#soporte-table" hx-swap="outerHTML" method="POST">
                    <button type="submit" class="p-2 rounded-xl border border-slate-200 dark:border-slate-800 bg-green-100 text-green-700 hover:bg-green-200 transition-all">Marcar atendida</button>
                </form>
                {% else %}
                <span class="px-3 py-1 bg-green-100 text-green-600 text-[10px] font-black rounded-full">Atendida</span>
                {% endif %}
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
